<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Portfolio</title>
    <style>
        /* Base Setup & Futuristic Background */
        body {
            background-color: #050510;
            background-image: radial-gradient(circle at 50% 50%, #111125 0%, #050510 100%);
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace; /* Techy font */
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Glassmorphism Container */
        .glass-panel {
            background: rgba(25, 25, 40, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.05), inset 0 0 20px rgba(255, 0, 255, 0.05);
            text-align: center;
        }

        /* Neon Typography */
        h1 {
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            margin-bottom: 10px;
        }

        p {
            line-height: 1.6;
            color: #a0a0b0;
            margin-bottom: 30px;
        }

        /* Cyberpunk Interactive Button */
        .neon-btn {
            background: transparent;
            color: #ff00ff;
            border: 2px solid #ff00ff;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .neon-btn:hover {
            background: #ff00ff;
            color: #000;
            box-shadow: 0 0 20px #ff00ff;
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>// SYS.INIT</h1>
        <p>Initializing portfolio protocol. I am a developer building the digital frontier. Welcome to my node.</p>
        <button class="neon-btn">Execute_Projects</button>
    </div>

</body>
</html>
